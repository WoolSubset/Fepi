<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Scanner Código de Barras</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    font-family: Arial;
    text-align:center;
    margin-top:40px;
}

#reader{
    width:350px;
    margin:auto;
}

#resultado{
    color:green;
    font-size:30px;
    font-weight:bold;
}

</style>

</head>
<body>

<h1>Escanear código de barras</h1>

<div id="reader"></div>

<h2>Código detectado:</h2>

<p id="resultado">Esperando escaneo...</p>

<script>

function exito(decodedText, decodedResult){

    document.getElementById("resultado").innerHTML =
    decodedText;

}

function error(errorMessage){
    // Ignorar errores
}

const html5QrCode = new Html5QrcodeScanner(
    "reader",
    {
        fps: 10,
        qrbox: 250,
        rememberLastUsedCamera: true,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
    }
);

html5QrCode.render(exito,error);

</script>

</body>
</html>
